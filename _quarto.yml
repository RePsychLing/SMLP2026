quarto-required: ">=1.7.29"
author: 
- "Phillip Alday"
# - "Douglas Bates" 
- "Reinhold Kliegl"
date: last-modified
date-format: iso
engine: julia
julia:
  exeflags: ["--project", "--threads=auto"]
execute:
  cache: true
  freeze: auto
number-sections: true
bibliography: 
- references.bib
csl: apa-annotated-bibliography.csl
github:
  owner: RePsychLing
  repo: SMLP2026
project:
  type: website
  title: "SMLP2026"
  execute-dir: project
  output-dir: _build/
  # NOTE: there is intentionally no explicit `render:` list here. Quarto renders all
  # project `.qmd` files by default, so the sidebar `contents:` tree below is the single
  # source of truth for which pages exist and in what order.

# editor_options:
#   chunk_output_type: console
filters:
  - code-fullscreen

format:
  html:
    # for more info, see
    # https://quarto.org/docs/output-formats/html-themes.html
    theme:
      light: [sandstone, theme.scss]
      dark: [darkly, theme-dark.scss]
    css: styles.css
    # defaults, can be overridden
    toc: true
    toc-depth: 2
    fig-width: 8
    fig-height: 6

website:
  title: "SMLP2026: Advanced Frequentist Track"
  site-url: https://RePsychLing.github.io/SMLP2026
  repo-url: https://github.com/RePsychLing/SMLP2026
  repo-actions: [edit, issue]
  # reader-mode: true
  navbar:
    background: primary
    # left:
    #   - text: "Home"
    #     href: index.qmd
    #   - about.qmd
    right:
      - icon: github
        href: https://github.com/RePsychLing/SMLP2026
  page-navigation: true
  back-to-top-navigation: true
  sidebar:
    style: "floating" # floating or docked
    search: true
    collapse-level: 1
    contents:
      - section: "Start Here"
        contents:
        - index.qmd
        - getting-started/about.qmd
        - getting-started/setup.qmd
        - getting-started/datasets.qmd
      - section: "Foundations: Linear Mixed Models"
        contents:
        - lmm-intro/sleepstudy.qmd
        - lmm-intro/singularity.qmd
      - section: "Seeing Your Model: Visualization & Diagnostics"
        contents:
        - visualization/shrinkageplot.qmd
        - visualization/AoGPlots.qmd
      - section: "Building Models: Specification & Random Effects"
        contents:
        - model-specification/partial_within.qmd
        - model-specification/mrk17.qmd
        - model-specification/largescaledesigned.qmd
      - section: "Contrast Coding & Transformations"
        contents:
        - contrasts/transformation.qmd
        - contrasts/contrasts_fggk21.qmd
        - contrasts/contrasts_kwdyz11.qmd
        - contrasts/sleepstudy_speed.qmd
      - section: "Inference & Uncertainty Quantification"
        contents:
        - inference/bootstrap.qmd
        - inference/profiling.qmd
        - inference/kb07.qmd
        - inference/power_simulation.qmd
      - section: "Generalized Linear Mixed Models"
        contents:
        - glmm/glmm.qmd
      - section: "Capstone Worked Examples"
        contents:
        - section: "The Emotikon Project"
          contents:
          - examples/emotikon/fggk21.qmd
          - examples/emotikon/check_emotikon_transform.qmd
        - section: "Visual Attention Experiments"
          contents:
          - examples/visual-attention/kwdyz11.qmd
          - examples/visual-attention/kkl15.qmd
      - section: "Reference & Appendix"
        contents:
        - reference/useful_packages.qmd
        - reference/arrow.qmd
        - reference/pkg.qmd
